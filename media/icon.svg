<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa6607"/>
      <stop offset="50%" style="stop-color:#c45000"/>
      <stop offset="100%" style="stop-color:#fa6607"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="22" y="38" width="84" height="56" rx="8" ry="8" fill="#1a1a1a" stroke="#fa6607" stroke-width="1.5"/>
  <!-- Viewfinder bump -->
  <rect x="46" y="30" width="24" height="12" rx="3" ry="3" fill="#1a1a1a" stroke="#fa6607" stroke-width="1.5"/>
  <!-- Shutter button -->
  <circle cx="78" cy="34" r="4" fill="#fa6607"/>
  <!-- Lens outer ring -->
  <circle cx="64" cy="66" r="22" fill="none" stroke="#fa6607" stroke-width="2"/>
  <!-- Lens gradient fill -->
  <circle cx="64" cy="66" r="18" fill="url(#lens)" opacity="0.9"/>
  <!-- Lens highlight -->
  <circle cx="58" cy="60" r="6" fill="white" opacity="0.15"/>
  <!-- Inner lens ring -->
  <circle cx="64" cy="66" r="10" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <!-- DNG text -->
  <text x="64" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="16" fill="#fa6607" letter-spacing="2">DNG</text>
</svg>
